# Stage 00 Intake — 주제 접수 기록
# 이후 모든 단계의 기준점. (메인 전용 파일)

topic: >-
  우리 가족 맞춤 정부 혜택 찾기 — 가구 구성·거주 지역·소득 수준을 입력하면
  받을 수 있는 정부 혜택(복지 서비스/보조금) 목록과 신청 방법을 안내하는 서비스.

constraints:
  - 한국 공공 서비스 대상. 정부 서비스 룩(KRDS) 활용.
  - 데모가 확실히 돌아가는 것이 최우선 (4시간 해커톤 스타터 키트 목표).
  - 근거 없는 수치/혜택을 지어내지 않는다 — 실제 복지 데이터셋에 기반.

presentationMinutes: 5        # 기본값 (사용자 별도 지정 없음)
implementationMinutes: 240    # 기본값 (마감 시계: 2026-06-19T08:29:39Z 시작)

techStack:
  use:
    - Next.js 14 (App Router) · React 18 · TypeScript   # web/ 검증된 스캐폴드
    - Tailwind 3 + "@krds-ui/core"                       # 정부 서비스 룩
  forbidden: []                                          # 별도 금지 기술 없음 (기본)

mandatory:
  # 공공 서비스 해커톤 통상 요건 — 사용자 확정 전 잠정.
  - 공공데이터 기반 (권위 단일 데이터셋: 복지로 복지서비스정보)

usableAssets:
  - "web/ 스캐폴드: Next.js+KRDS, install/build 통과 검증됨 → init 생략하고 이걸로 시작"
  - "web/lib/regions.ts: 전국 시도→시군구 → '거주 지역' 입력에 그대로 사용"
  - "design/krds/ + web/public/gov/: KRDS 토큰·정부 엠블럼 → 정부 서비스 룩"
  - "web/scripts/build-shelters.mjs: CP949 CSV→정제 JSON 변환 패턴 → 복지 CSV 가공에 재사용"
  - "data/boundaries/: 시도/시군구 경계 GeoJSON (지역 시각화가 필요하면)"
  - "관련 없음: web/public/data/shelters/* (민방위 대피소 — 재난 주제용, 이 주제엔 미사용)"

# 핵심 데이터 (Stage 01/05에서 확보·가공)
dataSource:
  primary: "한국사회보장정보원_복지서비스정보 (복지로) — data.go.kr 15083323 / fileData.do"
  secondary:
    - "보조금24 공공서비스(혜택) 정보 — data.go.kr 15113968 / openapi.do (키 신청)"
    - "중앙부처복지서비스 — data.go.kr 15090532 / openapi.do"
  note: >-
    fileData.do는 로그인 필요 → 자동 다운로드 막히면 브라우저 다운로드 폴백.
    받은 CSV는 build-shelters.mjs 패턴으로 정제 JSON 가공. 못 받으면 "샘플" 명시.

notes:
  # 가벼운 초기 발산 (방향 미확정 — 본격 발산/수렴/승인은 Stage 02)
  initialAngles:
    - "A. 자격 매칭 엔진형: 입력 조건 → 자격요건 규칙으로 '받을 수 있는 것'을 정확히 필터. (정확도가 Wow)"
    - "B. 안내·신청 동선형: 혜택을 찾는 데서 끝내지 않고 '어디서·어떻게 신청'까지 한 화면에. (행동 전환이 Wow)"
    - "C. 놓치고 있던 혜택 발견형: 사람들이 모르고 안 받던 혜택을 짚어주는 '숨은 혜택 N건' 강조. (감정적 임팩트)"
  pendingConfirm:
    - "발표 5분 / 구현 240분 / 공공데이터 의무 — 모두 기본값 가정. 다르면 알려주세요."
