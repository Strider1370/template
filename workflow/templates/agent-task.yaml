# 서브에이전트 작업 계약 템플릿 (Doc3 §8). 전체 지침 대신 이 좁은 계약만 전달한다.
taskId: <예: implement-result-screen>
stage: <stage-id>
agentRole: <ui-agent | data-agent | ai-agent | demo-agent | presentation-agent | reviewer>

objective: >
  한 문장으로 명확하게. 무엇을 만들고 무엇으로 검증하는가.

read:            # 최대 5개 주요 입력만
  - spec.md
  - plan.md

write:           # 이 에이전트가 수정 가능한 경로만
  - web/app/<feature>/

doNotWrite:      # 공통 파일은 메인 전용
  - spec.md
  - plan.md
  - package.json
  - presentation/
  - workflow/state.yaml
  - workflow/stages.yaml

deadlineMinutes: 25

completionCriteria:
  - fixture 데이터로 정상 렌더링된다.
  - 핵심 Wow Moment가 화면에 보인다.
  - 타입 오류 없음.
  - npm run web:build 통과.

reportFormat:    # 반드시 이 항목들로 보고
  - completed
  - changedFiles
  - verification
  - blockers
  - fallbackUsed
  - decisionsNeeded
