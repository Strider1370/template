# demo/demo.scenario.yaml — 데모 시나리오 (Stage 03 산출물)
#
# spec.md §8(데모 시나리오)·§9(Wow Moment)와 일치. selector/assertion은 Stage 07에서 그대로 사용.
# ⚠️ 개인정보: 가상 페르소나 / 익명 fixture만.

scenario:
  persona: "박지은(33, 가상) — 서울 거주, 8개월 아기를 키우는 외벌이 부부, 월 소득 약 350만원"
  situation: "'우리 가족이 받을 수 있는 정부 혜택이 있을까?' 막연히 궁금하지만 알아볼 엄두가 안 나던 차"
  steps:
    - step: 1
      userAction: "첫 화면에서 로그인 없이 자연어로 입력: '30대 부부, 8개월 아기, 서울, 월 350만원' 후 '혜택 찾기' 클릭"
      expected: "입력창과 찾기 버튼이 보이고, 어디에도 로그인/회원가입 화면이 없다"
      selector: '[data-testid="nl-input"], [data-testid="find-benefits"]'
      assertion: "nl-input과 find-benefits가 보이고, [data-testid=\"login\"]는 DOM에 존재하지 않는다"
    - step: 2
      userAction: "결과를 기다린다 (AI가 입력을 구조화하고 규칙 매칭)"
      expected: "AI가 알아들은 프로필이 구조화 칩(영유아가구·소득구간·서울)으로 표시되고, 혜택 카드들이 나타난다"
      selector: '[data-testid="parsed-profile"], [data-testid="benefit-card"]'
      assertion: "parsed-profile에 칩이 1개 이상, benefit-card가 1개 이상 렌더링된다"
    - step: 3
      userAction: "혜택 카드를 살펴본다"
      expected: "각 카드에 ✓충족 체크리스트 + '왜?' 배지 + 한 줄 근거 설명 + 신청 채널이 보이고, 화면에 '예시 데이터' 라벨과 면책이 있다"
      selector: '[data-testid="eligibility-checklist"], [data-testid="why-explanation"], [data-testid="apply-cta"], [data-testid="sample-data-label"]'
      assertion: "첫 benefit-card 안에 eligibility-checklist(✓ 항목 ≥1), why-explanation(비어있지 않음), apply-cta가 있고, sample-data-label이 화면에 보인다"

wowMoment:
  description: "자연어 한 줄 입력 직후, 로그인 화면을 한 번도 거치지 않고 혜택 카드마다 '✓ 소득 충족 / ✓ 자녀 연령 충족' 체크리스트와 '왜 당신이 해당되는지' 설명이 즉시 나타나는 순간"
  selector: '[data-testid="benefit-card"]'
  assertion: "benefit-card가 1개 이상 보이고, 각 카드에 eligibility-checklist의 ✓ 항목(1개 이상)과 why-explanation 텍스트(비어있지 않음)가 포함된다. 데모 전체에서 [data-testid=\"login\"]는 렌더되지 않는다."

successCriteria:
  - "1→3단계가 로그인 화면 없이 에러 없이 완주"
  - "benefit-card가 1개 이상 렌더링되고 각 카드에 why-explanation과 eligibility-checklist가 존재"
  - "화면에 sample-data-label(예시 데이터)과 면책 문구가 표시됨"
