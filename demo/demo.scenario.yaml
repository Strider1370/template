# demo/demo.scenario.yaml — 데모 시나리오 (Stage 03 산출물)
#
# spec.md §8(데모 시나리오)·§9(Wow Moment)와 일치해야 한다.
# 여기에는 화면 검증용 selector/assertion까지 적는다 → Stage 07(데모 검증)에서 그대로 사용.
# ⚠️ 개인정보: 실제 개인정보를 입력값으로 쓰지 마라. 가상 페르소나 / 익명 fixture만.
# (템플릿이다. 아래 빈 값을 실제 내용으로 채우고, 안내 주석은 지워도 된다.)

scenario:
  # 데모의 주인공(가상 페르소나)과 상황을 한 줄로.
  persona: ""          # 예: "서울 거주 1인 가구 김민수(가상)"
  situation: ""        # 예: "퇴근길 지진 재난문자를 받은 직후"
  steps:
    # 한 단계 = 사용자의 한 행동 + 그로 인해 화면에서 검증 가능한 변화.
    - step: 1
      userAction: ""    # 사용자가 하는 행동 (예: "지역 선택 후 '확인' 클릭")
      expected: ""      # 그 결과 화면에서 보여야 하는 것 (사람이 읽는 설명)
      selector: ""      # 검증 대상 요소 (예: '[data-testid="result-card"]')
      assertion: ""     # 통과 조건 (예: "요소가 보이고 텍스트에 '대피소'가 포함")
    - step: 2
      userAction: ""
      expected: ""
      selector: ""
      assertion: ""
    - step: 3
      userAction: ""
      expected: ""
      selector: ""
      assertion: ""

wowMoment:
  # 심사위원이 "오" 하는 그 한 장면. 화면에서 반드시 검증 가능해야 한다(spec §9와 동일).
  description: ""        # 무엇이 보이는가 (화면상의 변화)
  selector: ""          # 예: '[data-testid="wow-result"]'
  assertion: ""         # 예: "요소가 화면에 보이고 강조 표시가 있다"

# 이 흐름이 처음부터 끝까지 한 번 돌면 성공. 측정 가능한 기준으로.
successCriteria:
  - ""                  # 예: "3단계까지 에러 없이 완주"
  - ""                  # 예: "Wow Moment 요소가 화면에 렌더링됨"

# 실시간/외부 의존이 실패할 때의 데모 살리기(plan §3 폴백과 일치).
fallback:
  trigger: ""           # 언제 폴백으로 전환하는가 (예: "API 5초 내 무응답")
  action: ""            # 무엇으로 대체하는가 (예: "fixture JSON으로 동일 화면 렌더")
