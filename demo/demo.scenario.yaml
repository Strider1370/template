# demo/demo.scenario.yaml — 데모 시나리오 (Stage 03 산출물)
# spec.md §8(데모 시나리오)·§9(Wow Moment)와 일치. selector/assertion은 Stage 07 검증에서 그대로 사용.
# ⚠️ 개인정보: 가상 페르소나/익명 fixture만. 실제 개인정보 입력 금지.

scenario:
  persona: "김民우(가상), 27세 사회초년생 — 행정 신고 경험 거의 없음"
  situation: "우편함에서 법원 '지급명령'을 받고 무슨 뜻인지·뭘 해야 하는지 몰라 막막한 직후"
  steps:
    - step: 1
      userAction: "홈의 통합 입력칸에 받은 지급명령 문구를 붙여넣고(또는 '예시로 해보기' 샘플 선택) '분석' 클릭"
      expected: "AI가 문서를 읽고 가이드 카드 영역이 나타난다(로딩 후)"
      selector: '[data-testid="guide-card"]'
      assertion: "요소가 보이고 텍스트에 '지급명령'이 포함된다"
    - step: 2
      userAction: "생성된 4칸 카드를 확인"
      expected: "① 쉬운 말 뜻 ② 기한 ③ 당장 첫 걸음 ④ 어디로(관할) 가 한 화면에"
      selector: '[data-testid="step-first-action"]'
      assertion: "첫 걸음 칸 텍스트에 '이의신청'과 '2주'(또는 '14일')가 포함된다"
    - step: 3
      userAction: "각 항목의 근거 배지를 확인"
      expected: "답변 근거가 된 공식 출처 배지가 카드에 붙어 있고, 근거가 없으면 '공식 확인 필요'로 표시"
      selector: '[data-testid="source-badge"]'
      assertion: "출처 배지가 1개 이상 보이고, href가 사전 등록 출처 화이트리스트(fixture)에 속한다(환각 URL 차단)"
    - step: 4
      userAction: "심사위원이 즉석에서 다른 문서/상황(미리 안 짜둔 것)을 입력하고 '분석' 클릭"
      expected: "같은 엔진이 새 입력을 읽어 새 가이드 카드를 생성(대본이 아님을 증명)"
      selector: '[data-testid="guide-card"]'
      assertion: "새 입력의 핵심 키워드가 결과 카드 텍스트에 반영된다"

wowMoment:
  description: "즉석 입력(또는 지급명령 사진/텍스트) → 수 초 뒤 무서운 한자어 문서가 [뜻·기한·첫걸음·관할·출처] 카드로 바뀌고 출처 배지가 강조된다"
  selector: '[data-testid="guide-card"] [data-testid="source-badge"]'
  assertion: "가이드 카드 안에 출처 배지가 강조 표시로 함께 렌더링된다"

successCriteria:
  - "붙여넣기 입력 → 4칸 카드 + 출처 배지까지 에러 없이 완주"
  - "즉석 입력 1건을 라이브로 처리해 새 카드 생성"
  - "Wow Moment 요소(가이드 카드 + 출처 배지)가 화면에 렌더링됨"

# 엔진은 AI only(멀티모달+LLM). 코드 규칙 폴백은 만들지 않음 — 데모 보험은 사전준비/녹화.
fallback:
  trigger: "라이브에서 비전/LLM API 무응답·키 부재·사진 오독 등으로 결과가 안 나올 때"
  action: "사전 검증한 샘플 문서(동일 AI 경로)로 재실행 → 그래도 실패 시 사전 녹화 시연 1본 재생. (규칙 기반 코드 폴백은 두지 않음 = AI only 베팅)"
